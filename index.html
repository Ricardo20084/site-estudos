<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genially Clone - Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Inter:wght@400;600&family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sidebar: #191c21;
            --bg-canvas: #eef2f5;
            --primary: #6122e1;
            --text-color: #ffffff;
            --panel-bg: #f8f9fa;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-canvas);
            overflow: hidden;
        }

        /* BARRA LATERAL */
        .sidebar {
            width: 100px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 20px;
            z-index: 10;
        }

        .tool-btn {
            background: none;
            border: none;
            color: #8a8d91;
            cursor: pointer;
            font-size: 10px;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .tool-btn:hover { color: var(--primary); }

        .icon-box {
            width: 45px;
            height: 45px;
            background: #2b2e35;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .tool-btn:hover .icon-box { background: var(--primary); color: white; }

        /* ÁREA DE TRABALHO */
        .workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .main-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        .pages-bar {
            width: 150px;
            background: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        #canvas {
            flex-grow: 1;
            margin: 20px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        /* PAINEL DE PROPRIEDADES */
        .props-panel {
            width: 250px;
            background: var(--panel-bg);
            border-left: 1px solid #ddd;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 13px;
        }

        .prop-group { display: flex; flex-direction: column; gap: 5px; }
        .prop-group label { font-weight: 600; color: #666; }
        .prop-group input, .prop-group select { padding: 5px; border: 1px solid #ccc; border-radius: 4px; }

        /* ELEMENTOS */
        .element {
            position: absolute;
            cursor: move;
            min-width: 20px;
            min-height: 20px;
            box-sizing: border-box;
        }
        .element.selected { outline: 2px solid var(--primary); }

        .resizer {
            width: 10px;
            height: 10px;
            background: var(--primary);
            position: absolute;
            right: -5px;
            bottom: -5px;
            cursor: nwse-resize;
            border-radius: 50%;
            display: none;
        }
        .element.selected .resizer { display: block; }

        .text-el { font-size: 24px; font-weight: 600; color: #333; padding: 5px; outline: none; }
        .box-el { background: #ccc; border: 1px solid #999; }
        
        .img-el img { width: 100%; height: 100%; display: block; border-radius: inherit; pointer-events: none; }

        .hotspot-el {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 0 0 0 rgba(97, 34, 225, 0.7);
            animation: pulse 1.5s infinite;
        }

        /* POPUP */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .popup-content {
            background: white; padding: 30px; border-radius: 8px; position: relative; max-width: 400px;
        }
        .close-popup { position: absolute; top: 10px; right: 10px; cursor: pointer; font-weight: bold; }

        .page-item {
            padding: 10px; background: #eee; border-radius: 4px; cursor: pointer; text-align: center;
        }
        .page-item.active { background: var(--primary); color: white; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(97, 34, 225, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(97, 34, 225, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(97, 34, 225, 0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .btn-action {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-save { background: var(--primary); color: white; }
        .btn-secondary { background: #34495e; color: white; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <button class="tool-btn" onclick="addText()">
            <div class="icon-box">T</div>
            Texto
        </button>
        <button class="tool-btn" onclick="addBox()">
            <div class="icon-box">⬜</div>
            Bloco
        </button>
        <button class="tool-btn" onclick="promptImg()">
            <div class="icon-box">🖼️</div>
            Imagem
        </button>
        <button class="tool-btn" onclick="addHotspot()">
            <div class="icon-box">🔘</div>
            Hotspot
        </button>
    </aside>

    <div class="workspace">
        <header class="top-bar">
            <h2 style="color: #333; font-size: 18px;">Editor Online</h2>
            <div>
                <button class="btn-action btn-secondary" onclick="addPage()">+ Página</button>
                <button class="btn-action btn-save" id="saveOnlineBtn" onclick="saveToServer()">Salvar Online</button>
            </div>
        </header>

        <div class="main-container">
            <nav class="pages-bar" id="pagesList"></nav>
            <main id="canvas">
                <div id="overlay"><div class="popup-content"><span class="close-popup" onclick="closePopup()">×</span><div id="popupBody"></div></div></div>
            </main>
            <aside class="props-panel" id="propsPanel">
                <h3>Propriedades</h3>
                <div id="textControls" style="display:none">
                    <div class="prop-group">
                        <label>Fonte</label>
                        <select id="p-fontFamily" onchange="updateProp('fontFamily', this.value)">
                            <option value="'Inter', sans-serif">Inter</option>
                            <option value="'Roboto', sans-serif">Roboto</option>
                            <option value="'Montserrat', sans-serif">Montserrat</option>
                            <option value="'Playfair Display', serif">Playfair Display</option>
                            <option value="'Dancing Script', cursive">Dancing Script</option>
                            <option value="Georgia, serif">Georgia</option>
                            <option value="'Courier New', monospace">Courier New</option>
                        </select>
                    </div>
                    <div class="prop-group"><label>Tamanho</label><input type="number" id="p-fontSize" oninput="updateProp('fontSize', this.value + 'px')"></div>
                    <div class="prop-group">
                        <label>Estilo</label>
                        <div>
                            <button onclick="updateProp('fontWeight', 'bold')">B</button>
                            <button onclick="updateProp('fontStyle', 'italic')">I</button>
                        </div>
                    </div>
                    <div class="prop-group">
                        <label>Alinhamento</label>
                        <select onchange="updateProp('textAlign', this.value)">
                            <option value="left">Esquerda</option>
                            <option value="center">Centro</option>
                            <option value="right">Direita</option>
                        </select>
                    </div>
                </div>
                <div class="prop-group"><label>Cor</label><input type="color" id="p-color" oninput="updateProp('color', this.value)"></div>
                <div class="prop-group"><label>Fundo</label><input type="color" id="p-bg" oninput="updateProp('backgroundColor', this.value)"></div>
                <div class="prop-group"><label>Opacidade</label><input type="range" id="p-opacity" min="0" max="1" step="0.1" oninput="updateProp('opacity', this.value)"></div>
                <div class="prop-group"><label>Arredondamento</label><input type="number" oninput="updateProp('borderRadius', this.value + 'px')"></div>
                <div id="interactionControls" style="display:none">
                    <hr>
                    <div class="prop-group">
                        <label>Animação</label>
                        <select id="p-animation" onchange="updateProp('animation', this.value)">
                            <option value="pulse 1.5s infinite">Pulsação</option>
                            <option value="float 2s infinite ease-in-out">Flutuar</option>
                            <option value="rotate 3s infinite linear">Girar</option>
                            <option value="blink 1s infinite">Piscar</option>
                            <option value="none">Nenhuma</option>
                        </select>
                    </div>
                    <label>Ação ao Clicar</label>
                    <select id="p-action" onchange="setInteraction(this.value)">
                        <option value="none">Nenhuma</option>
                        <option value="goto">Ir para Slide</option>
                        <option value="popup">Abrir Janela</option>
                    </select>
                    <input type="text" id="p-actionVal" placeholder="Página ou Texto" oninput="saveInteraction()">
                </div>
                <div class="prop-group" style="margin-top: 20px; gap: 10px;">
                    <button class="btn-action btn-secondary" onclick="addText()">+ Adicionar Texto</button>
                    <button id="duplicateBtn" class="btn-action btn-secondary" style="display: none;" onclick="duplicateSelectedEl()">Duplicar Selecionado</button>
                    <button id="deleteBtn" class="btn-action" style="background-color: #e74c3c; color: white; display: none;" onclick="removeSelectedEl()">Remover Selecionado</button>
                </div>
            </aside>
        </div>
    </div>

    <script>
        let pages = [{ elements: [] }];
        let currentPage = 0;
        let projectId = null;
        let selectedEl = null;

        const canvas = document.getElementById('canvas');

        function addPage() {
            pages.push({ elements: [] });
            switchPage(pages.length - 1);
        }

        function switchPage(index) {
            saveCurrentPageState();
            currentPage = index;
            renderCanvas();
            updatePagesUI();
        }

        function saveCurrentPageState() {
            const els = Array.from(canvas.querySelectorAll('.element'));
            pages[currentPage].elements = els.map(el => ({
                type: el.dataset.type,
                style: el.getAttribute('style'),
                content: el.innerHTML,
                interaction: el.dataset.interaction ? JSON.parse(el.dataset.interaction) : null
            }));
        }

        function renderCanvas() {
            canvas.querySelectorAll('.element').forEach(e => e.remove());
            pages[currentPage].elements.forEach(data => {
                const el = createEl(data.type, false);
                el.setAttribute('style', data.style);
                el.innerHTML = data.content;
                if (data.interaction) el.dataset.interaction = JSON.stringify(data.interaction);
            });
        }

        function createEl(type, isNew = true) {
            const div = document.createElement('div');
            div.className = `element ${type}-el`;
            div.style.left = '50px';
            div.style.top = '50px';
            div.style.width = type === 'text' ? 'auto' : '100px';
            div.style.height = type === 'text' ? 'auto' : '100px';
            div.dataset.type = type;

            div.onmousedown = (e) => { selectElement(div); startDrag(e, div); };
            div.ondblclick = () => div.remove();

            const resizer = document.createElement('div');
            resizer.className = 'resizer';
            resizer.onmousedown = (e) => startResize(e, div);
            div.appendChild(resizer);

            canvas.appendChild(div);
            return div;
        }

        function addText() { const el = createEl('text'); el.innerText = "Digite aqui"; el.contentEditable = true; }
        function addBox() { createEl('box'); }
        function addHotspot() { const el = createEl('hotspot'); el.innerHTML = "+"; }

        function promptImg() {
            const body = document.getElementById('popupBody');
            body.innerHTML = `
                <h3 style="margin-top:0">Inserir Imagem</h3>
                <div class="prop-group">
                    <label>URL da Imagem</label>
                    <input type="text" id="imgUrlInput" placeholder="https://exemplo.com/imagem.png" style="width: 100%; box-sizing: border-box;">
                </div>
                <div class="prop-group" style="margin-top:10px">
                    <label>Ou arquivo do dispositivo</label>
                    <input type="file" id="imgFileInput" accept="image/*" style="width: 100%;">
                </div>
                <button class="btn-action btn-save" style="margin-top:15px; width:100%" onclick="confirmAddImg()">Adicionar ao Canvas</button>
            `;
            document.getElementById('overlay').style.display = 'flex';
        }

        function confirmAddImg() {
            const urlInput = document.getElementById('imgUrlInput').value;
            const fileInput = document.getElementById('imgFileInput').files[0];

            const addImgToCanvas = (src) => {
                const el = createEl('img');
                const img = document.createElement('img');
                img.src = src;
                el.appendChild(img);
                closePopup();
            };

            if (fileInput) {
                const reader = new FileReader();
                reader.onload = (e) => addImgToCanvas(e.target.result);
                reader.readAsDataURL(fileInput);
            } else if (urlInput) {
                addImgToCanvas(urlInput);
            } else {
                closePopup();
            }
        }

        function selectElement(el) {
            if (selectedEl) selectedEl.classList.remove('selected');
            selectedEl = el;
            selectedEl.classList.add('selected');
            document.getElementById('deleteBtn').style.display = 'block';
            document.getElementById('duplicateBtn').style.display = 'block';
            
            document.getElementById('textControls').style.display = el.dataset.type === 'text' ? 'block' : 'none';
            document.getElementById('interactionControls').style.display = el.dataset.type === 'hotspot' ? 'block' : 'none';

            // Sincronizar painel de propriedades com o elemento selecionado
            const style = window.getComputedStyle(el);
            document.getElementById('p-opacity').value = style.opacity;
            document.getElementById('p-color').value = rgbToHex(style.color);
            document.getElementById('p-bg').value = rgbToHex(style.backgroundColor);

            if (el.dataset.type === 'text') {
                document.getElementById('p-fontSize').value = parseInt(style.fontSize);
                const currentFont = style.fontFamily.split(',')[0].replace(/['"]/g, '').trim();
                const fontSelect = document.getElementById('p-fontFamily');
                for (let i = 0; i < fontSelect.options.length; i++) {
                    if (fontSelect.options[i].text === currentFont) { fontSelect.selectedIndex = i; break; }
                }
            }

            if (el.dataset.type === 'hotspot') {
                const anim = el.style.animation || 'pulse 1.5s infinite';
                document.getElementById('p-animation').value = anim;
            }
        }

        function rgbToHex(rgb) {
            if (!rgb || rgb.includes('rgba(0, 0, 0, 0)')) return '#ffffff';
            const vals = rgb.match(/\d+/g);
            return vals ? "#" + vals.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join("") : '#ffffff';
        }

        function updateProp(prop, val) {
            if (selectedEl) selectedEl.style[prop] = val;
        }

        function duplicateSelectedEl() {
            if (!selectedEl) return;

            const clone = selectedEl.cloneNode(true);
            clone.classList.remove('selected');

            // Desloca um pouco a posição para não ficar exatamente em cima do original
            const left = (parseInt(selectedEl.style.left) || 0) + 20;
            const top = (parseInt(selectedEl.style.top) || 0) + 20;
            clone.style.left = left + 'px';
            clone.style.top = top + 'px';

            // Reatribui eventos (cloneNode não copia listeners adicionados via JavaScript)
            clone.onmousedown = (e) => { selectElement(clone); startDrag(e, clone); };
            clone.ondblclick = () => clone.remove();

            const resizer = clone.querySelector('.resizer');
            if (resizer) {
                resizer.onmousedown = (e) => startResize(e, clone);
            }

            canvas.appendChild(clone);
            selectElement(clone);
        }

        function removeSelectedEl() {
            if (selectedEl) {
                selectedEl.remove();
                selectedEl = null;
                document.getElementById('deleteBtn').style.display = 'none';
                document.getElementById('duplicateBtn').style.display = 'none';
                document.getElementById('textControls').style.display = 'none';
                document.getElementById('interactionControls').style.display = 'none';
            }
        }

        function setInteraction(type) {
            if (!selectedEl) return;
            selectedEl.dataset.interaction = JSON.stringify({ type, value: "" });
            document.getElementById('p-actionVal').value = "";
        }

        function saveInteraction() {
            const type = document.getElementById('p-action').value;
            const value = document.getElementById('p-actionVal').value;
            selectedEl.dataset.interaction = JSON.stringify({ type, value });
        }

        // --- Drag & Resize ---
        function startDrag(e, el) {
            if (e.target.className === 'resizer') return;
            let startX = e.clientX - el.offsetLeft;
            let startY = e.clientY - el.offsetTop;
            document.onmousemove = (e) => {
                el.style.left = (e.clientX - startX) + 'px';
                el.style.top = (e.clientY - startY) + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        }

        function startResize(e, el) {
            e.stopPropagation();
            let startW = el.offsetWidth;
            let startH = el.offsetHeight;
            let startX = e.clientX;
            let startY = e.clientY;
            document.onmousemove = (e) => {
                el.style.width = (startW + e.clientX - startX) + 'px';
                el.style.height = (startH + e.clientY - startY) + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        }

        function updatePagesUI() {
            const list = document.getElementById('pagesList');
            list.innerHTML = "";
            pages.forEach((_, i) => {
                const item = document.createElement('div');
                item.className = `page-item ${i === currentPage ? 'active' : ''}`;
                item.innerText = `Página ${i + 1}`;
                item.onclick = () => switchPage(i);
                list.appendChild(item);
            });
        }

        async function saveToServer() {
            saveCurrentPageState();
            const res = await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: projectId, pages })
            });
            const data = await res.json();
            projectId = data.id;
            
            // Feedback visual no próprio botão (substituindo o alert)
            const btn = document.getElementById('saveOnlineBtn');
            const originalText = btn.innerText;
            btn.innerText = "✅ Salvo!";
            btn.style.backgroundColor = "#2ecc71";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = "";
            }, 2000);
        }

        function closePopup() { document.getElementById('overlay').style.display = 'none'; }

        window.onload = () => updatePagesUI();

        // Interação em Tempo de Execução (Simulação)
        canvas.onclick = (e) => {
            if (e.target === canvas) return;
            const el = e.target.closest('.element');
            if (!el || !el.dataset.interaction) return;
            const inter = JSON.parse(el.dataset.interaction);
            if (inter.type === 'goto') switchPage(parseInt(inter.value) - 1);
            if (inter.type === 'popup') {
                document.getElementById('popupBody').innerText = inter.value;
                document.getElementById('overlay').style.display = 'flex';
            }
        };
    </script>
</body>
</html>
